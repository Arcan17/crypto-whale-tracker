<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crypto Whale Tracker Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #09111f;
        color: #edf5ff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(38, 165, 228, 0.22), transparent 32rem),
          linear-gradient(135deg, #09111f 0%, #121a2c 50%, #101827 100%);
      }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: flex-start;
        margin-bottom: 28px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 4rem);
        letter-spacing: -0.06em;
      }
      p {
        color: #a9b8cf;
        line-height: 1.6;
        margin: 0;
      }
      .pill, button {
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        color: #edf5ff;
        padding: 10px 14px;
        white-space: nowrap;
      }
      button {
        cursor: pointer;
        font-weight: 700;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin: 28px 0;
      }
      .card, table {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(9, 17, 31, 0.72);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(18px);
      }
      .card {
        padding: 22px;
      }
      .label {
        color: #7f90aa;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .metric {
        margin-top: 12px;
        font-size: 2rem;
        font-weight: 900;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
      }
      th, td {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 15px 16px;
        text-align: left;
        vertical-align: top;
      }
      th {
        color: #7f90aa;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .hash {
        color: #7dd3fc;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .status {
        margin-top: 16px;
        color: #fbbf24;
      }
      @media (max-width: 760px) {
        header, .grid { grid-template-columns: 1fr; display: grid; }
        th:nth-child(4), td:nth-child(4) { display: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>🐋 Whale Intelligence</h1>
          <p>Portfolio dashboard for the FastAPI on-chain intelligence pipeline. Seed demo data, start the API, then refresh this view.</p>
        </div>
        <button id="refresh">Refresh data</button>
      </header>

      <div class="pill">API base: <span id="api-base"></span></div>
      <section class="grid">
        <article class="card">
          <div class="label">Alerts today</div>
          <div class="metric" id="alerts">—</div>
        </article>
        <article class="card">
          <div class="label">Volume today</div>
          <div class="metric" id="volume">—</div>
        </article>
        <article class="card">
          <div class="label">Last alert</div>
          <div class="metric" id="last-alert">—</div>
        </article>
      </section>

      <table>
        <thead>
          <tr>
            <th>Tx</th>
            <th>Token</th>
            <th>USD value</th>
            <th>Direction</th>
            <th>Route</th>
          </tr>
        </thead>
        <tbody id="transactions"></tbody>
      </table>
      <p class="status" id="status"></p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const apiBase = params.get("api") || "http://localhost:8080";
      document.getElementById("api-base").textContent = apiBase;

      const formatUsd = (value) =>
        Number(value || 0).toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
      const shortHash = (value) => value ? `${value.slice(0, 10)}…${value.slice(-6)}` : "—";

      async function loadDashboard() {
        const status = document.getElementById("status");
        status.textContent = "Loading API data…";
        try {
          const [statsResponse, txResponse] = await Promise.all([
            fetch(`${apiBase}/stats`),
            fetch(`${apiBase}/transactions?limit=10`),
          ]);
          if (!statsResponse.ok || !txResponse.ok) throw new Error("API request failed");

          const stats = await statsResponse.json();
          const txData = await txResponse.json();

          document.getElementById("alerts").textContent = stats.total_alerts_today ?? 0;
          document.getElementById("volume").textContent = formatUsd(stats.total_volume_usd_today);
          document.getElementById("last-alert").textContent = stats.last_alert_at
            ? new Date(stats.last_alert_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
            : "—";

          document.getElementById("transactions").innerHTML = txData.transactions.map((tx) => `
            <tr>
              <td class="hash">${shortHash(tx.tx_hash)}</td>
              <td>${tx.token_symbol}</td>
              <td>${formatUsd(tx.value_usd)}</td>
              <td>${tx.direction}</td>
              <td>${tx.from_label} → ${tx.to_label}</td>
            </tr>
          `).join("") || `<tr><td colspan="5">No transactions found. Run <code>python scripts/seed_demo.py</code>.</td></tr>`;
          status.textContent = "Dashboard data loaded.";
        } catch (error) {
          status.textContent = `Could not load API data from ${apiBase}. Start the API with: uvicorn api.main:app --host 0.0.0.0 --port 8080`;
        }
      }

      document.getElementById("refresh").addEventListener("click", loadDashboard);
      loadDashboard();
    </script>
  </body>
</html>
